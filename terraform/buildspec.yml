version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing Terraform..."
      - curl -LO https://releases.hashicorp.com/terraform/1.13.0/terraform_1.13.0_linux_amd64.zip
      - unzip terraform_1.13.0_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - terraform version

  build:
    commands:
      - echo "Changing directory..."
      - cd terraform/aws-quick
      - terraform init
      - terraform plan
      - terraform apply -auto-approve
